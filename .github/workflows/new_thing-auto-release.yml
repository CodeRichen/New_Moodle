name: Build And Release new_thing

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            binary_name: new_thing-windows
            extension: .exe
          - os: macos-latest
            label: macOS
            binary_name: new_thing-macos
            extension: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller selenium webdriver-manager colorama requests py7zr patool rarfile gdown

      - name: Build executable
        run: |
          python -m PyInstaller --clean --noconfirm --onefile --console --name "${{ matrix.binary_name }}" --hidden-import selenium.webdriver.chrome.webdriver --hidden-import selenium.webdriver.chrome.service --hidden-import selenium.webdriver.chrome.options --hidden-import selenium.webdriver.common.by --hidden-import selenium.webdriver.support.ui --hidden-import selenium.webdriver.support.expected_conditions --hidden-import selenium.webdriver.support --hidden-import webdriver_manager.chrome --hidden-import webdriver_manager.core.driver_cache --hidden-import webdriver_manager.core.manager --hidden-import gdown "new_things/new_thing.py"

      - name: Prepare packaged binary
        shell: bash
        run: |
          mkdir -p release
          cp "dist/${{ matrix.binary_name }}${{ matrix.extension }}" "release/${{ matrix.binary_name }}${{ matrix.extension }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: release/${{ matrix.binary_name }}${{ matrix.extension }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten release files
        shell: bash
        run: |
          mkdir -p release
          find release-assets -type f -maxdepth 2 -exec cp {} release/ \;
          ls -lah release

      - name: Generate release metadata
        id: meta
        shell: bash
        run: |
          TAG="$(date +%Y%m%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name= ${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: |
            release/new_thing-windows.exe
            release/new_thing-macos